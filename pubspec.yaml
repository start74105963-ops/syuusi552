name: slot_manager
description: スロット収支管理アプリ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状態管理
  flutter_riverpod: ^2.5.1

  # ルーティング
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.5

  # 認証
  google_sign_in: ^6.2.1

  # ローカルDB（オフライン対応）
  sqflite: ^2.3.3
  path: ^1.9.0

  # カレンダー
  table_calendar: ^3.1.2

  # チャート
  fl_chart: ^0.69.0

  # UI補助
  intl: ^0.20.2
  gap: ^3.0.1
  cupertino_icons: ^1.0.8

  # 共有
  share_plus: ^9.0.0
  url_launcher: ^6.3.0

  # ローカルストレージ
  shared_preferences: ^2.3.2

  # UUID生成
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
